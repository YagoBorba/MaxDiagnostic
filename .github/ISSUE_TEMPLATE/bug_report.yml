name: 🐛 Bug Report
description: Report a bug to help us improve MaxDiagnostic
title: "🐛 [Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 🙏
        
        Before submitting, please search existing issues to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of MaxDiagnostic are you running?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform are you using?
      options:
        - Android
        - iOS
        - Web
        - Windows
        - Linux
        - macOS
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Flutter Version
      description: What Flutter version are you using?
      placeholder: "3.19.6"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Open the app
        2. Navigate to Speed Test
        3. Tap 'Start Test'
        4. See error
      value: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: "What should have happened?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: network-info
    attributes:
      label: Network Information
      description: Information about your network connection (if relevant)
      placeholder: |
        - Connection type: WiFi/Mobile Data
        - Speed: Download/Upload speeds
        - ISP: Internet Service Provider
        - Router model: (if WiFi issue)
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: If applicable, add error messages or logs from the debug console
      render: shell
      placeholder: "Paste any error messages or logs here"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: "Any additional information that might be helpful"

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true

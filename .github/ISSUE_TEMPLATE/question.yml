name: ❓ Question or Support
description: Ask a question about using MaxDiagnostic
title: "❓ [Question]: "
labels: ["question", "support"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your question! 🤔
        
        Before submitting, please check if your question is already answered in:
        - [README.md](../../README.md)
        - [CONTRIBUTING.md](../../CONTRIBUTING.md)
        - [Existing Issues](../../issues)
        - [Documentation](../../wiki) (if available)

  - type: dropdown
    id: question-type
    attributes:
      label: Question Type
      description: What type of question is this?
      options:
        - How to use a feature
        - Installation/Setup help
        - Performance question
        - Architecture/Code question
        - Network diagnostics help
        - Troubleshooting
        - Feature clarification
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: "How can I...?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about your question
      placeholder: "I'm trying to... but..."

  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of MaxDiagnostic are you using?
      placeholder: "1.0.0"

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform are you using?
      options:
        - Android
        - iOS
        - Web
        - Windows
        - Linux
        - macOS
        - Not applicable

  - type: textarea
    id: attempted-solutions
    attributes:
      label: What Have You Tried?
      description: Describe any solutions or workarounds you've already attempted
      placeholder: "I tried..."

  - type: textarea
    id: related-docs
    attributes:
      label: Related Documentation
      description: Did you find any related documentation that didn't fully answer your question?
      placeholder: "I looked at... but it didn't explain..."

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true

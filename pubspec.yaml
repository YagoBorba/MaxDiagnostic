name: maxt_diagnostic
description: "A professional network diagnostic application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core & Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  get_it: ^7.7.0
  equatable: ^2.0.5

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Functional Programming
  dartz: ^0.10.1

  # Network & Device Info
  connectivity_plus: ^6.0.3
  network_info_plus: ^5.0.3
  device_info_plus: ^10.1.0
  http: ^1.2.1
  wifi_scan: ^0.4.1
  permission_handler: ^11.3.1

  # WebView for Speed Test
  flutter_inappwebview: ^6.0.0

  # PDF & Sharing
  printing: ^5.12.0
  share_plus: ^12.0.1
  flutter_dotenv: ^5.1.0
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.2


  # Navigation
  go_router: ^14.2.0

  # Icons
  lucide_icons: ^0.257.0
  flutter_html_to_pdf: ^0.7.0
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - .env.example

dependency_overrides:
  win32: ^5.14.0
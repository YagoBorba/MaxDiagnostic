publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '^3.3.0' # <-- ALTERAÇÃO APLICADA AQUI

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Utilitários & Core
  cupertino_icons: ^1.0.6
